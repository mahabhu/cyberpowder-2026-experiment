# Single TDD cell, band 78, 20 MHz BW, 30 kHz SCS, USRP B200 split-8.
# Migrated to the cu_cp.amf schema for srsRAN ≥ release_24_10 (4bf1543936 in this profile).
# Slicing info merged in here; etc/srsran/slicing.yml is now a no-op.
# Placeholders LANIP and GNBID are sed-replaced by bin/deploy-srsran.sh at startup
# from the gNB host's IP on 192.168.1.0/24 (LANIP=full IP, GNBID=last octet).

gnb_id: 10GNBID

cu_cp:
  amf:
    addr: 192.168.1.1
    port: 38412
    bind_addr: LANIP
    supported_tracking_areas:
      - tac: 1
        plmn_list:
          - plmn: "99999"
            tai_slice_support_list:
              - sst: 1
                sd: 1

ru_sdr:
  device_driver: uhd
  device_args: type=b200,num_recv_frames=64,num_send_frames=64
  srate: 23.04
  otw_format: sc12
  tx_gain: 85
  rx_gain: 75

cell_cfg:
  dl_arfcn: 629334
  band: 78
  channel_bandwidth_MHz: 20
  common_scs: 30
  plmn: "99999"
  tac: 1
  pci: GNBID

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: true
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: true
  ngap_filename: /tmp/gnb_ngap.pcap
